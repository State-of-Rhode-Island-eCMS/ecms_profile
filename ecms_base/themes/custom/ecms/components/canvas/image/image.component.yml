$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Image
group: 'RI.Gov'
status: stable
description: |
  Standalone image for Canvas pages. Renders a media-library or
  URL-sourced image via the Canvas image pipeline, wrapped in a <figure>.
  `size` caps the rendered max-width with sensible presets; `aspect_ratio`
  optionally crops the image to a fixed shape via `object-fit: cover`.
  Optional caption renders as <figcaption>.
props:
  type: object
  required:
    - image
  properties:
    image:
      $ref: json-schema-definitions://canvas.module/image
      type: object
      title: Image
      examples:
        - src: images/placeholder.png
          alt: 'Placeholder image'
          width: 190
          height: 287
    size:
      type: string
      title: Size
      description: Caps the image's rendered max-width. `full` fills the available column.
      enum:
        - full
        - large
        - medium
        - small
      meta:enum:
        full: 'Full (column width)'
        large: 'Large (~600px)'
        medium: 'Medium (~400px)'
        small: 'Small (~240px)'
      default: full
      examples: [ full ]
    aspect_ratio:
      type: string
      title: Aspect ratio
      description: Optionally crop the image to a fixed ratio. `auto` keeps the image's natural proportions.
      enum:
        - auto
        - 16-9
        - 4-3
        - 1-1
        - 3-2
        - 2-3
      meta:enum:
        auto: 'Auto (natural)'
        16-9: '16:9 (widescreen)'
        4-3: '4:3 (classic)'
        1-1: '1:1 (square)'
        3-2: '3:2 (photo)'
        2-3: '2:3 (portrait)'
      default: auto
      examples: [ auto ]
    caption:
      type: [string, 'null']
      title: Caption
      default: null
