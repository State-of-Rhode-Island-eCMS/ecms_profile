$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Hero
group: RI.Gov
description: Full-bleed photo banner with wave bottom, overlaid h1, and a navy bar below for a search form, icon links, and a lower slot (intended for tabs). Image is randomized per page load from hero-images.json; the location label in the top-right travels with the chosen image.
props:
  type: object
  properties:
    title:
      title: Heading text
      type: string
slots:
  search_box:
    title: Search form block
  icon_links:
    title: Icon link items (one or more canvas/icon-link components)
  footer:
    title: Footer slot (full-width to max container — intended for tabs)
libraryOverrides:
  js:
    hero.js: {}
  dependencies:
    - core/drupal
    - core/once
