langcode: en
status: true
dependencies:
  config:
    - field.storage.node.field_agency_or_muni
    - field.storage.node.field_service_description
    - field.storage.node.field_service_type
    - field.storage.node.field_service_url
    - search_api.server.acquia_search_server
  module:
    - node
    - search_api_solr
    - taxonomy
third_party_settings:
  search_api_solr:
    finalize: false
    commit_before_finalize: false
    commit_after_finalize: false
    debug_finalize: false
    highlighter:
      maxAnalyzedChars: 51200
      fragmenter: gap
      usePhraseHighlighter: true
      highlightMultiTerm: true
      preserveMulti: false
      regex:
        slop: 0.5
        pattern: blank
        maxAnalyzedChars: 10000
      highlight:
        mergeContiguous: false
        requireFieldMatch: false
        snippets: 3
        fragsize: 0
    mlt:
      mintf: 1
      mindf: 1
      maxdf: 0
      maxdfpct: 0
      minwl: 0
      maxwl: 0
      maxqt: 100
      maxntp: 2000
      boost: false
      interestingTerms: none
    term_modifiers:
      slop: 3
      fuzzy: 1
      fuzzy_analyzer: true
    advanced:
      index_prefix: ''
      collection: ''
      timezone: ''
    multilingual:
      limit_to_content_language: false
      include_language_independent: true
      use_language_undefined_as_fallback_language: false
      specific_languages:
        en: '0'
        es: '0'
        pt-pt: '0'
      use_universal_collation: false
id: rigov_online_services
name: 'RIGov Online Services'
description: ''
read_only: false
field_settings:
  field_agency_or_muni:
    label: 'Agency or Muni'
    datasource_id: 'entity:node'
    property_path: field_agency_or_muni
    type: string
    dependencies:
      config:
        - field.storage.node.field_agency_or_muni
  field_service_description:
    label: 'Service Description'
    datasource_id: 'entity:node'
    property_path: field_service_description
    type: text
    dependencies:
      config:
        - field.storage.node.field_service_description
  field_service_type:
    label: 'Online-Service Taxonomy'
    datasource_id: 'entity:node'
    property_path: field_service_type
    type: integer
    dependencies:
      config:
        - field.storage.node.field_service_type
  field_service_url:
    label: 'Service URL'
    datasource_id: 'entity:node'
    property_path: field_service_url
    type: string
    dependencies:
      config:
        - field.storage.node.field_service_url
  name:
    label: 'Online-Service Taxonomy » Taxonomy term » Name'
    datasource_id: 'entity:node'
    property_path: 'field_service_type:entity:name'
    type: string
    dependencies:
      config:
        - field.storage.node.field_service_type
      module:
        - taxonomy
  node_grants:
    label: 'Node access information'
    property_path: search_api_node_grants
    type: string
    indexed_locked: true
    type_locked: true
    hidden: true
  status:
    label: Boolean
    datasource_id: 'entity:node'
    property_path: status
    type: boolean
    indexed_locked: true
    type_locked: true
    dependencies:
      module:
        - node
  uid:
    label: 'Entity reference'
    datasource_id: 'entity:node'
    property_path: uid
    type: integer
    indexed_locked: true
    type_locked: true
    dependencies:
      module:
        - node
  url:
    label: URI
    property_path: search_api_url
    type: string
    configuration:
      absolute: true
datasource_settings:
  'entity:node':
    bundles:
      default: false
      selected:
        - online_service
    languages:
      default: true
      selected: {  }
processor_settings:
  add_url: {  }
  aggregated_field: {  }
  auto_aggregated_fulltext_field: {  }
  content_access:
    weights:
      preprocess_query: -30
  custom_value: {  }
  entity_type: {  }
  highlight:
    weights:
      postprocess_query: 0
    prefix: '<strong>'
    suffix: '</strong>'
    excerpt: true
    excerpt_always: false
    excerpt_length: 256
    exclude_fields: {  }
    highlight: always
    highlight_partial: false
  language_with_fallback: {  }
  rendered_item: {  }
  reverse_entity_references: {  }
  solr_date_range:
    weights:
      preprocess_index: 0
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  delete_on_fail: true
  index_directly: true
  track_changes_in_references: true
server: acquia_search_server
