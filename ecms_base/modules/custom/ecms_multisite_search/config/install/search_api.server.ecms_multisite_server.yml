  module:
    - acquia_search
id: ecms_multisite_server
name: 'eCMS Multisite Search Server'
description: 'Cross-site search server for the aggregator site. Identical to the per-site Acquia Search server but with site_hash disabled so all factory sites content is returned.'
backend: ecms_acquia_search_solr
backend_config:
  retrieve_data: true
  highlight_data: true
  site_hash: false
  server_prefix: ''
  domain: generic
  environment: default
  connector: solr_acquia_connector
  connector_config:
    timeout: 10
    index_timeout: 10
    optimize_timeout: 10
    finalize_timeout: 30
    skip_schema_check: true
    solr_version: ''
    http_method: AUTO
    commit_within: 1000
    jmx: false
    jts: false
    solr_install_dir: ''
  optimize: false
  fallback_multiple: false
  disabled_field_types: {  }
  disabled_caches: {  }
  disabled_request_handlers:
    - request_handler_elevate_default_7_0_0
    - request_handler_replicationmaster_default_7_0_0
    - request_handler_replicationslave_default_7_0_0
  disabled_request_dispatchers:
    - request_dispatcher_httpcaching_default_7_0_0
  rows: 10
  index_single_documents_fallback_count: 10
  index_empty_text_fields: false
  suppress_missing_languages: false
