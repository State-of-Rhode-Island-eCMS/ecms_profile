$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Hero
group: RI.Gov
description: Full-bleed photo banner with wave bottom, overlaid page heading, and a navy bar below for a search form and icon navigation links.
props:
  type: object
  properties:
    image:
      title: Image
      $ref: 'json-schema-definitions://canvas.module/image'
      examples:
        - src: images/placeholder.webp
          alt: 'Placeholder image'
          width: 1400
          height: 900
    background_image_opacity:
      type: integer
      title: Background image opacity (percentage)
      minimum: 1
      maximum: 100
      examples: [ 100 ]
    title:
      title: Heading text
      type: string
    heading_level:
      title: Heading level (h1–h6)
      type: string
      enum: [h1, h2, h3, h4, h5, h6]
    image_location:
      title: Image location label
      type: string
    modifier:
      title: BEM modifier class
      type: string
slots:
  search_box:
    title: Search form block
  icon_links:
    title: Icon link items (one or more canvas/icon-link components)
