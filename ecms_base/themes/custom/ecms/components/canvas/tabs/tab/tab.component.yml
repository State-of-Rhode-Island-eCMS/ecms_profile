$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Canvas Tab
status: experimental
group: RI.Gov
description: |
  A single tab for use inside a Canvas Tab Group. The `label` and optional
  `icon` define the tab button. Any Canvas component can be placed in the
  `panel` slot to form the tab's content.

  Place one or more of these inside a Canvas Tab Group's `tabs` slot.

props:
  type: object
  required:
    - label
  properties:
    label:
      title: Label
      type: string
      examples: ['Residents']
    icon:
      title: Icon
      type: string
      enum:
        - alarm-bell
        - anchor-small
        - arrow-right
        - bus
        - chevron-down
        - chevron-left
        - chevron-right
        - close-x
        - cog
        - default-logo
        - download
        - feed
        - file-excel
        - file-generic
        - file-pdf
        - file-powerpoint
        - file-word
        - globe
        - guillemot-left
        - guillemot-right
        - home
        - icon-ios-share
        - information
        - link-external
        - map
        - map-marker
        - maple-leaf
        - plus-minus
        - ri-state-seal
        - search-glass
        - social-blogger
        - social-blusky
        - social-facebook
        - social-flickr
        - social-instagram
        - social-linkedin
        - social-twitter
        - social-youtube
      examples: ['home']

slots:
  panel:
    title: Tab Content

thirdPartySettings:
  sdcStorybook:
    disabledStories:
      - all
